name: Electron-builder Build

permissions:
  contents: read
  packages: read
  actions: write

on:
  push:
    branches: [main, electron-migration]

jobs:
  version:
    runs-on: ubuntu-22.04
    if: github.repository_owner == 'tetherto'
    outputs:
      version: ${{ steps.meta.outputs.VERSION }}
    strategy:
      matrix:
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4

      - name: Read & validate version
        id: meta
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Error: package.json version ('$VERSION') is not semantic versioning (MAJOR.MINOR.PATCH)."
            exit 1
          fi
          TAG="v$VERSION"
          echo "TAG=$TAG"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

  build-linux:
    permissions:
      contents: write # to upload artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install dependencies
        run: |
          npm install
      - name: Build application
        env:
          PEARPASS_UPGRADE_LINK: ${{ vars.PEARPASS_UPGRADE_LINK }}
        run: |
          npm run dist:linux

      - name: "Install @actions/artifact module"
        id: install-actions-artifact-module
        run: |
          npm install @actions/artifact@2.3.2 --global
          echo "NODE_PATH=$(npm root --quiet -g)" >> $GITHUB_ENV
      
      - name: Find & rename AppImage file
        id: find_file
        run: |
          set -euo pipefail
          APPIMAGE_PATH=$(find "$GITHUB_WORKSPACE" -name "*.AppImage" -type f | head -n 1)
          echo "Original AppImage: $APPIMAGE_PATH"

          NEW_NAME="PearPass-Desktop-Linux-${{ matrix.arch }}-v${{ needs.version.outputs.version }}.AppImage"
          NEW_PATH="$GITHUB_WORKSPACE/$NEW_NAME"

          mv "$APPIMAGE_PATH" "$NEW_PATH"
          echo "Renamed AppImage to: $NEW_PATH"

          echo "APPIMAGE_PATH=$NEW_PATH" >> "$GITHUB_OUTPUT"

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Create binary tar.gz archive
        id: create_tarball
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          APPIMAGE_PATH="${{ steps.find_file.outputs.APPIMAGE_PATH }}"

          # Create extraction directory
          EXTRACT_DIR="$GITHUB_WORKSPACE/appimage-extract"
          mkdir -p "$EXTRACT_DIR"

          # Extract AppImage contents
          cd "$EXTRACT_DIR"
          chmod +x "$APPIMAGE_PATH"
          "$APPIMAGE_PATH" --appimage-extract

          # Create tarball staging directory with consistent structure
          TARBALL_DIR="$GITHUB_WORKSPACE/tarball-staging"
          mkdir -p "$TARBALL_DIR/lib"
          mkdir -p "$TARBALL_DIR/pear-pass"

          # Find and copy the main binary
          BINARY_PATH=$(find squashfs-root -name "pear-pass" -type f -executable | head -n 1)
          if [[ -z "$BINARY_PATH" ]]; then
            BINARY_PATH=$(find squashfs-root -name "pearpass" -type f -executable | head -n 1)
          fi
          if [[ -n "$BINARY_PATH" ]]; then
            cp "$BINARY_PATH" "$TARBALL_DIR/pearpass"
            chmod +x "$TARBALL_DIR/pearpass"
            echo "Copied binary from: $BINARY_PATH"
          else
            echo "❌ Error: Could not find main binary in AppImage"
            find squashfs-root -type f -executable
            exit 1
          fi

          # Find and copy app.bundle
          BUNDLE_PATH=$(find squashfs-root -name "app.bundle" -type f | head -n 1)
          if [[ -n "$BUNDLE_PATH" ]]; then
            cp "$BUNDLE_PATH" "$TARBALL_DIR/pear-pass/app.bundle"
            echo "Copied app.bundle from: $BUNDLE_PATH"
          else
            echo "⚠️ Warning: app.bundle not found in AppImage"
          fi

          # Find and copy native .so libraries
          find squashfs-root -name "*.so" -type f | while read -r so_file; do
            cp "$so_file" "$TARBALL_DIR/lib/"
            echo "Copied library: $so_file"
          done

          # List the contents for verification
          echo "=== Tarball contents ==="
          find "$TARBALL_DIR" -type f

          # Create the tarball
          cd "$TARBALL_DIR"
          TARBALL_NAME="PearPass.linux.${ARCH}.bin.tar.gz"
          tar -czvf "$GITHUB_WORKSPACE/$TARBALL_NAME" .

          echo "TARBALL_PATH=$GITHUB_WORKSPACE/$TARBALL_NAME" >> "$GITHUB_OUTPUT"
          echo "Created tarball: $GITHUB_WORKSPACE/$TARBALL_NAME"

      - uses: actions/upload-artifact@v4
        if: ${{ steps.find_file.outputs.APPIMAGE_PATH != '' }}
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])
            
      - name: "Upload folders as artifacts"
        id: upload-artifacts
        run: |
          const fs = require('fs');
          const path = require('path');
          const { DefaultArtifactClient } = require('@actions/artifact');

      - uses: actions/upload-artifact@v4
        if: ${{ steps.create_tarball.outputs.TARBALL_PATH != '' }}
        with:
          name: PearPass.linux.${{ matrix.arch }}.bin.tar.gz
          path: "${{ steps.create_tarball.outputs.TARBALL_PATH }}"

      - name: Upload tarball to static.tether.dev
        if: ${{ steps.create_tarball.outputs.TARBALL_PATH != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/staging') }}
        env:
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          # Install AWS CLI for S3-compatible uploads
          sudo apt-get update && sudo apt-get install -y awscli

          # Upload to Cloudflare R2 (or S3-compatible storage)
          aws s3 cp "${{ steps.create_tarball.outputs.TARBALL_PATH }}" \
            "s3://${CLOUDFLARE_R2_BUCKET}/pearpass/PearPass.linux.${{ matrix.arch }}.bin.tar.gz" \
            --endpoint-url "${CLOUDFLARE_R2_ENDPOINT}" \
            --region auto \
            --acl public-read

          echo "✓ Uploaded tarball to static.tether.dev"

  macos:
    runs-on: macos-14
    needs: [version]
    strategy:
      matrix:
        arch:
          - x64
          - arm64
    defaults:
      run:
        working-directory: ./appling
    env:
      # Apple code signing identity - used for app, installer, and DMG signing
      APPLE_SIGNING_IDENTITY: "959D2C8BB8323AEF9C2367ACA2F854AE4D7DE458"
      APP_FILE: ${{ github.ref == 'refs/heads/main' && 'app' || github.ref == 'refs/heads/staging' && 'app.staging' || 'app.dev' }}.cjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APIKEY_BASE64: ${{ secrets.APPLE_APIKEY }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.provisionprofile
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          APIKEY_PATH=$RUNNER_TEMP/AuthKey.p8

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          echo -n "$APIKEY_BASE64" | base64 --decode -o $APIKEY_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # add notarytool credentials
          xcrun notarytool store-credentials "notary" --key "$APIKEY_PATH" --key-id S3AG2UXSC5 --issuer 2067dae8-140d-4016-9a2b-d6ea80a20708

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
      - name: Install dependencies
        run: |
          npm install
      - name: Build application
        env:
          MAC_CODESIGN_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          CSC_NAME: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          PEARPASS_UPGRADE_LINK: ${{ vars.PEARPASS_UPGRADE_LINK }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          npm run dist:mac:ci

      - name: "Install @actions/artifact module"
        id: install-actions-artifact-module
        run: |
          npm install @actions/artifact@2.3.2 --global
          echo "NODE_PATH=$(npm root --quiet -g)" >> $GITHUB_ENV
      
      - name: "Extract Actions runtime variables" 
        id: extract-runtime-environment-variables
        uses: actions/github-script@v7
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])
            
      - name: "Upload folders as artifacts"
        id: upload-artifacts
        run: |
          const fs = require('fs');
          const path = require('path');
          const { DefaultArtifactClient } = require('@actions/artifact');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const productName = pkg.productName;
          const version = pkg.version;

          const dmgName = `${productName}-${version}-arm64.dmg`;
          const dmgPath = path.join('dist', dmgName);

          if (!fs.existsSync(dmgPath)) {
            throw new Error(`Expected DMG not found at ${dmgPath}`);
          }

          const artifact = new DefaultArtifactClient();
          console.log(`Uploading macOS DMG: ${dmgName} from ${dmgPath}`);
          artifact.uploadArtifact(dmgName, [dmgPath], 'dist');
        shell: node {0}
  build-win32:
    permissions:
      contents: write # to upload artifacts
      actions: read
    needs: [version, linux, macos]
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted # self-hosted signer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install dependencies
        run: |
          npm install
      - name: Build application
        env:
          WIN_SUBJECT: ${{ secrets.WIN_SUBJECT }}
          WIN_THUMBPRINT: ${{ secrets.WIN_THUMBPRINT }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          npm run dist:win

      - name: "Install @actions/artifact module"
        id: install-actions-artifact-module
        run: |
          npm install @actions/artifact@2.3.2 --global
          echo "NODE_PATH=$(npm root --quiet -g)" >> $GITHUB_ENV
      
      - name: "Extract Actions runtime variables" 
        id: extract-runtime-environment-variables
        uses: actions/github-script@v7
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])
            
      - name: "Upload folders as artifacts"
        id: upload-artifacts
        env:
          NODE_PATH: ${{ env.NODE_PATH }}
        run: |
          const fs = require('fs');
          const path = require('path');
          const { DefaultArtifactClient } = require('@actions/artifact');

          const artifact = new DefaultArtifactClient()

          function listFilesRecursive (dir) {
            let results = []
            const list = fs.readdirSync(dir)
            list.forEach(function (file) {
              const filePath = path.join(dir, file)
              const stat = fs.statSync(filePath)
              if (stat && stat.isDirectory()) {
                results = results.concat(listFilesRecursive(filePath))
              } else if (stat && stat.isFile()) {
                results.push(filePath)
              }
            })
            return results
          }

          const files = listFilesRecursive('out/make')
          files.forEach(file => {
            const artifactName = path.basename(file)
            console.log(`Uploading artifact: ${artifactName} from ${file}`)
            artifact.uploadArtifact(artifactName, [file], './out/make')
          })
        shell: node {0}