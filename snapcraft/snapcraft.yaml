name: pearpass
version: 4.0.0
title: PearPass
summary: password manager
description: |
  Pearpass
license: Apache-2.0
website:
  - https://pass.pears.com
contact:
  - https://pass.pears.com
issues:
  - https://pass.pears.com
source-code:
  - https://github.com/holepunchto
base: core24
grade: stable
confinement: strict
platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

# Provide WebKitGTK runtime via the content snap. This avoids relying on the
# host OS having WebKitGTK 6 installed (Ubuntu 22.04 doesn't).
plugs:
  webkitgtk-6-gnome-2404:
    interface: content
    target: $SNAP/webkitgtk-platform
    default-provider: webkitgtk-6-gnome-2404

# WebKitGTK spawns helper processes (WebKitNetworkProcess/WebKitWebProcess/etc)
# using absolute paths under /usr/lib/<triplet>/webkitgtk-6.0.
# In a snap, our staged files live under $SNAP/usr/..., so we bind-mount the
# expected location to the staged directory.
# NOTE: snapd/snapcraft do not expand $SNAPCRAFT_ARCH_TRIPLET in `layout:`.
# Define both common multiarch triplets; only the active architecture will be
# used by WebKitGTK, but both bind sources must exist.
layout:
  /usr/lib/aarch64-linux-gnu/webkitgtk-6.0:
    bind: $SNAP/usr/lib/aarch64-linux-gnu/webkitgtk-6.0
  /usr/lib/x86_64-linux-gnu/webkitgtk-6.0:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/webkitgtk-6.0
parts:
  pearpass:
    plugin: dump
    source-type: local
    source: PearPass.AppDir
    stage:
      - usr/
    stage-packages:
      - libatomic1
      - libwebkitgtk-6.0-4
      - libgtk-4-1
      - libjavascriptcoregtk-6.0-1
      # Runtime dependency pulled in by WebKitGTK on some hosts (e.g. Ubuntu 22.04).
      - libunistring5
      # Needed by WebKitGTK multimedia pipeline (provides libgsttranscoder-1.0.so.0).
      - libgstreamer-plugins-bad1.0-0
    override-prime: |
      craftctl default
      # Ensure the mount point exists for the WebKitGTK content snap.
      mkdir -p "$CRAFT_PRIME/webkitgtk-platform"
      # Ensure layout bind source directories exist on all architectures.
      mkdir -p "$CRAFT_PRIME/usr/lib/aarch64-linux-gnu/webkitgtk-6.0" \
               "$CRAFT_PRIME/usr/lib/x86_64-linux-gnu/webkitgtk-6.0"
apps:
  pearpass:
    command: usr/bin/pear-pass
    desktop: usr/share/applications/PearPass.desktop
    plugs:
      - webkitgtk-6-gnome-2404
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - network
      - home
    environment:
      # The app loads native addons (e.g. fx-native) which depend on WebKitGTK.
      # Ensure both the content-snap libraries and our staged libraries are in
      # the dynamic loader search path.
      LD_LIBRARY_PATH: $SNAP/webkitgtk-platform/usr/lib:$SNAP/webkitgtk-platform/usr/lib/aarch64-linux-gnu:$SNAP/webkitgtk-platform/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib:$SNAP/usr/lib/aarch64-linux-gnu:$SNAP/usr/lib/x86_64-linux-gnu:$SNAP/lib:$SNAP/lib/aarch64-linux-gnu:$SNAP/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
      PATH: $SNAP/webkitgtk-platform/usr/bin:$PATH
lint:
  ignore:
    - library:
      - usr/lib/*.so*
      - usr/lib/**/*.so*
