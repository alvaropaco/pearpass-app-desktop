name: pearpass
version: 4.0.0
title: PearPass
summary: password manager
description: |
  Pearpass
license: Apache-2.0
website:
  - https://pass.pears.com
contact:
  - https://pass.pears.com
issues:
  - https://pass.pears.com
source-code:
  - https://github.com/holepunchto
base: core24
grade: stable
confinement: classic
platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64
parts:
  pearpass:
    plugin: dump
    source-type: local
    source: PearPass.AppDir
    stage:
      - usr/
    stage-packages:
      - libatomic1
      - libwebkitgtk-6.0-4
      - libgtk-4-1
      - libjavascriptcoregtk-6.0-1
apps:
  pearpass:
    command: usr/bin/pear-pass
    desktop: usr/share/applications/PearPass.desktop
    environment:
      # The app loads native addons (e.g. fx-native) which depend on WebKitGTK.
      # In classic confinement the dynamic loader may not automatically search
      # the snap's multi-arch library directories, so include them explicitly.
      LD_LIBRARY_PATH: $SNAP/usr/lib:$SNAP/usr/lib/aarch64-linux-gnu:$SNAP/usr/lib/x86_64-linux-gnu:$SNAP/lib:$SNAP/lib/aarch64-linux-gnu:$SNAP/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
lint:
  ignore:
    - library:
      - usr/lib/*.so*
      - usr/lib/**/*.so*
